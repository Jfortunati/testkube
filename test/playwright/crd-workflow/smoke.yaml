apiVersion: testworkflows.testkube.io/v1
kind: TestWorkflow
metadata:
  name: playwright-workflow-smoke-command-args
  labels:
    core-tests: workflows
    tool: playwright
    artifacts: "true"
    category: e2e-ui-testing
  annotations:
    testkube.io/icon: playwright
spec:
  content:
    git:
      uri: https://github.com/kubeshop/testkube
      revision: main
      paths:
      - test/playwright/playwright-project
  container:
    resources:
      requests:
        cpu: 1500m
        memory: 1500Mi
    workingDir: /data/repo/test/playwright/playwright-project
  job:
    activeDeadlineSeconds:  600
  steps:
  - name: Install dependencies
    run:
      image: mcr.microsoft.com/playwright:v1.56.1 # image on step level
      command:
      - npm
      args:
      - ci
  - name: Run tests
    run:
      image: mcr.microsoft.com/playwright:v1.56.1
      command:
        - "npx"
      args:
        - "playwright"
        - "test"
        - "--output"
        - "/data/artifacts"
      env:
      - name: PLAYWRIGHT_HTML_REPORT
        value: /data/artifacts/playwright-report
    steps:
    - name: Save artifacts
      workingDir: /data/artifacts
      artifacts:
        paths:
        - '**/*'
---
