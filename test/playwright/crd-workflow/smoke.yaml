apiVersion: testworkflows.testkube.io/v1
kind: TestWorkflow
metadata:
  name: distributed-playwright-workflow-smoke
  labels:
    core-tests: workflows
    tool: playwright
    artifacts: "true"
    category: e2e-ui-testing
  annotations:
    testkube.io/icon: playwright
spec:
  content:
    git:
      uri: https://github.com/kubeshop/testkube
      revision: main
      paths:
      - test/playwright/playwright-project
  container:
    image: mcr.microsoft.com/playwright:v1.56.1
    workingDir: /data/repo/test/playwright/playwright-project
  job:
    activeDeadlineSeconds:  600
  steps:
  - name: Install dependencies
    shell: 'npm ci'
  - name: Run tests
    parallel:
      count: 2
      transfer:
      - from: /data/repo
      fetch:
      - from: /data/repo/test/playwright/playwright-project/blob-report
        to: /data/reports
      container:
        resources:
          requests:
            cpu: 1500m
            memory: 1500Mi
      run:
        shell: 'npx playwright test --reporter=blob --shard {{ index + 1 }}/{{ count }}'
  - name: Merge reports
    condition: always
    shell: 'npx playwright merge-reports --reporter=html /data/reports'
    artifacts: # artifacts with fetch from parallel steps
      paths:
      - "playwright-report/**"
---
apiVersion: testworkflows.testkube.io/v1
kind: TestWorkflow
metadata:
  name: distributed-playwright-workflow-smoke-junit
  labels:
    core-tests: workflows
    tool: playwright
    artifacts: "true"
    junit: "true"
    category: e2e-ui-testing
  annotations:
    testkube.io/icon: playwright
description: "Distributed Playwright with `--shard`"
spec:
  content:
    git:
      uri: https://github.com/kubeshop/testkube
      revision: main
      paths:
      - test/playwright/playwright-project
  container:
    image: mcr.microsoft.com/playwright:v1.56.1
    workingDir: /data/repo/test/playwright/playwright-project
  job:
    activeDeadlineSeconds:  600
  steps:
  - name: Install dependencies
    shell: 'npm ci'
  - name: Run tests
    parallel:
      description: "Shard: {{ index + 1 }}/{{ count }}"
      count: 2
      transfer:
      - from: /data/repo
      container:
        resources:
          requests:
            cpu: 1500m
            memory: 1500Mi
      run:
        shell: 'mkdir /data/artifacts && npx playwright test --reporter=list,junit --shard={{ index + 1 }}/{{ count }}'
        env:
        - name: PLAYWRIGHT_JUNIT_OUTPUT_NAME
          value: "/data/artifacts/junit-report-{{ index + 1 }}.xml"
      artifacts: # artifacts directly on parallel step
        workingDir: /data/artifacts/
        paths:
        - '**/*'
---
apiVersion: testworkflows.testkube.io/v1
kind: TestWorkflow
metadata:
  name: playwright-workflow-load-balancing-demo
  labels:
    core-tests: workflows
    tool: playwright
    artifacts: "true"
    junit: "true"
    category: e2e-ui-testing
    load-balancing: "true"
  annotations:
    testkube.io/icon: playwright
spec:
  content:
    git:
      uri: https://github.com/kubeshop/testkube
      revision: main
      paths:
      - test/playwright/playwright-load-balancing-demo
  container:
    image: mcr.microsoft.com/playwright:v1.56.1
    workingDir: /data/repo/test/playwright/playwright-load-balancing-demo
    resources:
      requests:
        cpu: 128m
        memory: 128Mi
  job:
    activeDeadlineSeconds: 600
  steps:
  - name: Run tests
    parallel:
      maxCount: 5
      shards:
        shardFile: 'glob("shards/shard-*.txt")'
      description: '{{ relpath(shard.shardFile, "shards") }}'
      transfer:
      - from: /data/repo
      fetch:
      - from: /data/artifacts
      container:
        resources:
          requests:
            cpu: 1500m
            memory: 1500Mi
      run:
        workingDir: /data/repo/test/playwright/playwright-load-balancing-demo
        shell: |
          mkdir -p /data/artifacts
          SHARD_BASE=$(basename "{{ shard.shardFile }}" .txt)
          export PLAYWRIGHT_JUNIT_OUTPUT_NAME="/data/artifacts/junit-${SHARD_BASE}.xml"
          npm install
          SPEC_FILES=$(cat "{{ shard.shardFile }}" | grep -v '^[[:space:]]*$' | tr '\n' ' ')
          npx playwright test --reporter=list,junit $SPEC_FILES
    artifacts:
      workingDir: /data/artifacts
      paths:
      - '**/*'
